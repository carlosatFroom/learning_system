<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}Learning System{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    screens: {
                        'fold': '500px',     // Z Fold outer->inner transition
                        'fold-open': '800px', // Z Fold fully open
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        /* Prevent iOS tap highlight */
        * { -webkit-tap-highlight-color: transparent; }
        /* Smooth scrolling on iOS */
        .scroll-touch { -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen min-h-[100dvh] flex flex-col">
    <header class="bg-slate-800 border-b border-slate-700 px-3 py-3 md:p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="/" class="text-lg md:text-xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">
                Learning System
            </a>
            <div class="flex gap-4 text-sm text-slate-400">
                <a href="/" class="hover:text-white transition-colors p-1">Courses</a>
                <a href="/admin" class="hover:text-white transition-colors p-1">Admin</a>
            </div>
        </div>
    </header>

    <main class="flex-1 w-full max-w-7xl mx-auto p-3 md:p-6">
        {% block content %}{% endblock %}
    </main>

    <script>
        lucide.createIcons();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
